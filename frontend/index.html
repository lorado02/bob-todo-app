<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A modern, responsive todo application">
    <title>Todo App</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="app-title">
                <span class="icon">✓</span>
                My Todo List
            </h1>
            <p class="app-subtitle">Stay organized and productive</p>
        </header>

        <!-- Add Todo Form -->
        <section class="add-todo-section">
            <form id="add-todo-form" class="add-todo-form">
                <div class="form-group">
                    <input 
                        type="text" 
                        id="todo-title" 
                        class="input-field" 
                        placeholder="What needs to be done?"
                        required
                        autocomplete="off"
                    >
                    <textarea 
                        id="todo-description" 
                        class="input-field textarea-field" 
                        placeholder="Add a description (optional)"
                        rows="2"
                    ></textarea>
                </div>
                <button type="submit" class="btn btn-primary">
                    <span class="btn-icon">+</span>
                    Add Todo
                </button>
            </form>
        </section>

        <!-- Filter Tabs -->
        <section class="filter-section">
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">
                    All <span class="count" id="count-all">0</span>
                </button>
                <button class="filter-tab" data-filter="active">
                    Active <span class="count" id="count-active">0</span>
                </button>
                <button class="filter-tab" data-filter="completed">
                    Completed <span class="count" id="count-completed">0</span>
                </button>
                <button class="filter-tab" data-filter="deleted">
                    Deleted <span class="count" id="count-deleted">0</span>
                </button>
            </div>
        </section>

        <!-- Todo List -->
        <section class="todo-list-section">
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Loading todos...</p>
            </div>

            <div id="error-message" class="error-message hidden">
                <span class="error-icon">⚠️</span>
                <p id="error-text"></p>
                <button class="btn btn-secondary btn-sm" onclick="location.reload()">Retry</button>
            </div>

            <div id="empty-state" class="empty-state hidden">
                <div class="empty-icon">📝</div>
                <h3>No todos yet</h3>
                <p>Add your first todo to get started!</p>
            </div>

            <ul id="todo-list" class="todo-list"></ul>
        </section>

        <!-- Stats Footer -->
        <footer class="stats-footer">
            <div class="stats">
                <span id="total-stats">0 total tasks</span>
            </div>
        </footer>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <span id="toast-message"></span>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Todo</h2>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="edit-todo-form">
                <div class="form-group">
                    <label for="edit-title">Title</label>
                    <input 
                        type="text" 
                        id="edit-title" 
                        class="input-field" 
                        required
                    >
                </div>
                <div class="form-group">
                    <label for="edit-description">Description</label>
                    <textarea 
                        id="edit-description" 
                        class="input-field textarea-field" 
                        rows="3"
                    ></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal hidden">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h2>Confirm Delete</h2>
                <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
            </div>
            <p class="modal-text">Are you sure you want to permanently delete this todo? This action cannot be undone.</p>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
                <button type="button" class="btn btn-danger" onclick="confirmPermanentDelete()">Delete Permanently</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
